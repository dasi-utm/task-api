name: Build and Deploy TaskManager API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: europe-west1
  GAR_REPOSITORY: services-repo
  IMAGE_NAME: taskmanager-api
  DOTNET_VERSION: '8.0'

jobs:
  # ============================================
  # CI STAGES
  # ============================================

  # 1. RESTORE DEPENDENCIES
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

  # 2. BUILD APPLICATION
  build:
    runs-on: ubuntu-latest
    needs: restore
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build application
        run: dotnet build --configuration Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./TaskManager.API/bin/Release/
          retention-days: 1

  # 3. UNIT TESTS
  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run Unit Tests
        run: |
          dotnet test tests/TaskManager.UnitTests/TaskManager.UnitTests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=unit-tests.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ./tests/TaskManager.UnitTests/TestResults/
          retention-days: 7

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: ./tests/TaskManager.UnitTests/TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  # 4. INTEGRATION TESTS
  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Start test dependencies
        run: |
          docker network create test-network || true
          docker run -d --name rabbitmq-test --network test-network -p 5672:5672 -p 15672:15672 rabbitmq:3.13-management
          docker run -d --name postgres-test --network test-network -p 5432:5432 \
            -e POSTGRES_DB=taskmanager_test \
            -e POSTGRES_USER=testuser \
            -e POSTGRES_PASSWORD=testpass \
            postgres:15
          sleep 15

      - name: Run Integration Tests
        run: |
          dotnet test tests/TaskManager.IntegrationTests/TaskManager.IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=integration-tests.trx"
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: taskmanager_test

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./tests/TaskManager.IntegrationTests/TestResults/
          retention-days: 7

      - name: Publish integration test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Tests
          path: ./tests/TaskManager.IntegrationTests/TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Cleanup test containers
        if: always()
        run: |
          docker stop rabbitmq-test postgres-test
          docker rm rabbitmq-test postgres-test
          docker network rm test-network

  # 5. CODE QUALITY & STATIC ANALYSIS
  code-quality:
    runs-on: ubuntu-latest
    needs: restore
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dotnet-format
        run: dotnet tool install -g dotnet-format

      - name: Check code formatting
        run: |
          dotnet format --verify-no-changes --verbosity diagnostic || \
          echo "⚠️ Code formatting issues found. Run 'dotnet format' locally to fix."

      - name: Run static analysis
        run: dotnet build --configuration Release --no-restore /p:RunAnalyzers=true

  # 6. SECURITY SCAN
  security-scan:
    runs-on: ubuntu-latest
    needs: restore
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run security scan
        run: |
          dotnet list package --vulnerable --include-transitive || true

  # ============================================
  # CD STAGES (Only on main branch)
  # ============================================

  # 7. BUILD AND PUSH DOCKER IMAGE
  docker-build-push:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, code-quality]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 416.0.0'
          install_components: 'gke-gcloud-auth-plugin'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev --quiet

      - name: Set image tags
        run: |
          echo "IMAGE_URI_SHA=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE_URI_LATEST=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:latest" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_URI_SHA }}
            ${{ env.IMAGE_URI_LATEST }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=$(date -Iseconds)

      - name: Log image info
        run: |
          echo "✅ Image built and pushed:"
          echo "  - SHA version: $IMAGE_URI_SHA"
          echo "  - Latest version: $IMAGE_URI_LATEST"

  # 8. DEPLOY TO GKE
  deploy-to-gke:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 416.0.0'
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/taskmanager-api taskmanager-api=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest -n services
          kubectl rollout status deployment/taskmanager-api -n services --timeout=300s

      - name: Verify deployment
        run: |
          echo "✅ Deployment completed"
          kubectl get pods -n services | grep taskmanager-api
          kubectl logs -l app=taskmanager-api -n services --tail=20

  # 9. VERIFY DEPLOYMENT
  verify-deployment:
    runs-on: ubuntu-latest
    needs: deploy-to-gke
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Check deployment status
        run: |
          echo "=========================================="
          echo "✅ CI/CD PIPELINE COMPLETED"
          echo "=========================================="
          echo "📦 Image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest"
          echo "🔧 Commit: ${{ github.sha }}"
          echo "🚀 Deployment: taskmanager-api"
          echo "=========================================="
          echo ""
          echo "📋 Pipeline logs available at:"
          echo "   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"